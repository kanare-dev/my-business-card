<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Card — Kanare Kodera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@200;300;400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    /* =====================================================
       CSS Variables — ここだけ変更してデザインを微調整できる
       ===================================================== */
    :root {
      /* Colors — kanare.dev dark theme と統一 */
      --color-bg:              #131210;
      --color-text-primary:    #BFBFBF;
      --color-text-secondary:  #949494;
      --color-accent:          #d8aa00;
      --color-divider:         rgba(148, 148, 148, 0.25);
      --color-monogram:        rgba(191, 191, 191, 0.04);

      /* Typography — kanare.dev と統一 */
      --font-sans:  'IBM Plex Sans JP', sans-serif;
      --font-mono:  'JetBrains Mono', 'Fira Code', monospace;

      /* Card dimensions — ラクスル 標準名刺 91×55mm 縦型 */
      --card-w:    55mm;
      --card-h:    91mm;

      /* 塗り足し 3mm (印刷時のガイド表示用) */
      --bleed:     3mm;

      /* セーフエリア = 塗り足し + 余白 */
      --safe-h:    8mm;   /* 上下の安全マージン */
      --safe-v:    7mm;   /* 左右の安全マージン */

      /* Spacing tokens */
      --sp-xs:   1.5mm;
      --sp-sm:   3mm;
      --sp-md:   5mm;
      --sp-lg:   8mm;
      --sp-xl:   12mm;

      /* Font sizes */
      --fs-name:    9.5mm;
      --fs-title:   2.2mm;
      --fs-tag:     1.9mm;
      --fs-label:   1.7mm;
      --fs-value:   2.1mm;
    }

    /* =====================================================
       Reset
       ===================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* =====================================================
       Preview layout (not printed)
       ===================================================== */
    body {
      background: #171716;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 48px 40px;
      font-family: var(--font-sans);
    }

    .preview__label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
    }

    /* =====================================================
       Card — shared
       ===================================================== */
    .card {
      width:    var(--card-w);
      height:   var(--card-h);
      background: var(--color-bg);
      position: relative;
      overflow: hidden;
      /* 塗り足しガイド (プレビューのみ表示) */
      outline: var(--bleed) solid rgba(216, 170, 0, 0.4);
      outline-offset: calc(-1 * var(--bleed));
    }

    /* セーフエリア内コンテンツ */
    .card__inner {
      position: absolute;
      top:    var(--safe-h);
      bottom: var(--safe-h);
      left:   var(--safe-v);
      right:  var(--safe-v);
      display: flex;
      flex-direction: column;
    }

    /* セクション区切り線 */
    .card__rule {
      width: 7mm;
      height: 0.25mm;
      background: var(--color-accent);
      flex-shrink: 0;
    }

    /* =====================================================
       Front — 表面
       ===================================================== */
    .card--front .card__inner {
      justify-content: space-between;
    }

    /* 名前ブロック */
    .card__name {
      display: flex;
      flex-direction: column;
      gap: 0;
      line-height: 1;
    }

    /* アバター */
    .card__avatar-wrap {
      display: flex;
      justify-content: center;
    }

    .card__avatar {
      width:         13mm;
      height:        13mm;
      border-radius: 50%;
      overflow:      hidden;
      flex-shrink:   0;
    }

    .card__avatar img {
      width:      100%;
      height:     100%;
      object-fit: cover;
    }

    .card__name-line {
      font-family:    var(--font-sans);
      font-weight:    200;
      font-size:      var(--fs-name);
      letter-spacing: -0.01em;
      color:          var(--color-text-primary);
      line-height:    1.1;
    }

    /* 下部ブロック */
    .card__bottom {
      display: flex;
      flex-direction: column;
      gap: var(--sp-sm);
    }

    .card__title {
      font-family:    var(--font-sans);
      font-weight:    300;
      font-size:      var(--fs-title);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color:          var(--color-text-secondary);
    }

    .card__tags {
      display: flex;
      flex-direction: column;
      gap: var(--sp-xs);
    }

    .card__tag {
      font-family:    var(--font-mono);
      font-weight:    300;
      font-size:      var(--fs-tag);
      letter-spacing: 0.02em;
      color:          var(--color-text-secondary);
    }

    /* =====================================================
       Back — 裏面
       ===================================================== */
    .card--back .card__inner {
      justify-content: space-between;
      align-items: flex-start;
    }

    /* QRコード */
    .card__qr-wrap {
      align-self: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-xs);
    }

    .card__qr {
      width:            22mm;
      height:           22mm;
      background:       var(--color-text-primary);
      border-radius:    1mm;
      display:          flex;
      align-items:      center;
      justify-content:  center;
    }

    .card__qr-caption {
      font-family:    var(--font-mono);
      font-size:      1.6mm;
      font-weight:    300;
      letter-spacing: 0.05em;
      color:          var(--color-text-secondary);
    }

    /* 連絡先ブロック */
    .card__contact {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--sp-sm);
    }

    .card__contact-group {
      display: flex;
      flex-direction: column;
      gap: var(--sp-xs);
    }

    .card__contact-item {
      display:     flex;
      align-items: center;
      gap:         2mm;
    }

    .card__contact-label {
      width:       4mm;
      height:      4mm;
      flex-shrink: 0;
      color:       var(--color-text-secondary);
      display:     flex;
      align-items: center;
    }

    .card__contact-label svg {
      width:  100%;
      height: 100%;
    }

    .card__contact-value {
      font-family:    var(--font-mono);
      font-weight:    300;
      font-size:      var(--fs-value);
      letter-spacing: 0.01em;
      color:          var(--color-text-primary);
    }


    /* =====================================================
       @media print — 印刷時はプレビューUIを非表示
       ===================================================== */
    @media print {
      body { background: none; padding: 0; gap: 0; }
      .preview__label { display: none; }
      .card { outline: none; page-break-after: always; }
    }
  </style>
</head>
<body>

  <span class="preview__label">Front · 表面</span>

  <!-- ================================================
       表面 (Front)
       ================================================ -->
  <div class="card card--front" role="img" aria-label="Business card front — Kanare Kodera, Cloud Engineer">
    <div class="card__inner">

      <!-- 名前 -->
      <div class="card__name">
        <span class="card__name-line">Kanare</span>
        <span class="card__name-line">Kodera</span>
      </div>

      <!-- アバター（中央） -->
      <div class="card__avatar-wrap">
        <div class="card__avatar">
          <img src="avatar.png" alt="Avatar">
        </div>
      </div>

      <!-- 肩書き・技術スタック -->
      <div class="card__bottom">
        <div class="card__rule"></div>
        <span class="card__title">Cloud Engineer</span>
        <div class="card__tags">
          <span class="card__tag">AWS</span>
          <span class="card__tag">Terraform</span>
          <span class="card__tag">Kubernetes</span>
          <span class="card__tag">Platform Engineering</span>
        </div>
      </div>

    </div>
  </div>

  <span class="preview__label">Back · 裏面</span>

  <!-- ================================================
       裏面 (Back)
       ================================================ -->
  <div class="card card--back" role="img" aria-label="Business card back — contact information">
    <div class="card__inner">

      <!-- QRコード (kanare.dev へのリンク) -->
      <div class="card__qr-wrap">
        <div class="card__qr">
          <img src="qr-code.svg" width="100%" height="100%" alt="QR code for kanare.dev">
        </div>
        <span class="card__qr-caption">kanare.dev</span>
      </div>

      <!-- 連絡先 -->
      <div class="card__contact">
        <div class="card__rule"></div>

        <!-- Web + Mail -->
        <div class="card__contact-group">
          <div class="card__contact-item">
            <span class="card__contact-label">
              <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/>
                <path d="M8 1.5C8 1.5 5.5 4.5 5.5 8s2.5 6.5 2.5 6.5S10.5 11.5 10.5 8 8 1.5 8 1.5z" stroke="currentColor" stroke-width="1.3"/>
                <path d="M1.5 8h13" stroke="currentColor" stroke-width="1.3"/>
              </svg>
            </span>
            <span class="card__contact-value">kanare.dev</span>
          </div>
          <div class="card__contact-item">
            <span class="card__contact-label">
              <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="1.5" y="3.5" width="13" height="9" rx="1" stroke="currentColor" stroke-width="1.3"/>
                <path d="M1.5 4.5L8 9l6.5-4.5" stroke="currentColor" stroke-width="1.3"/>
              </svg>
            </span>
            <span class="card__contact-value">me@kanare.dev</span>
          </div>
        </div>

        <!-- SNS -->
        <div class="card__contact-group">
          <div class="card__contact-item">
            <span class="card__contact-label">
              <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <path d="M12.6 2h2.1L9.9 7.3 15.5 14h-4.2l-3.5-4.5L4 14H1.9l5.2-5.8L1 2h4.3l3.2 4.1L12.6 2zm-.7 10.8h1.2L4.2 3.2H2.9l9 9.6z" fill="currentColor"/>
              </svg>
            </span>
            <span class="card__contact-value">@kanare_io</span>
          </div>
          <div class="card__contact-item">
            <span class="card__contact-label">
              <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M8 1C4.13 1 1 4.13 1 8c0 3.08 2 5.69 4.78 6.61.35.06.48-.15.48-.34v-1.2C4.34 13.4 3.93 12 3.93 12c-.32-.81-.78-1.02-.78-1.02-.64-.43.05-.43.05-.43.7.05 1.07.72 1.07.72.63 1.07 1.64.76 2.04.58.06-.45.25-.76.45-.94-1.56-.18-3.2-.78-3.2-3.47 0-.77.27-1.4.72-1.89-.07-.18-.31-.9.07-1.87 0 0 .59-.19 1.92.72A6.66 6.66 0 018 5.08c.59 0 1.19.08 1.75.23 1.33-.9 1.92-.72 1.92-.72.38.97.14 1.69.07 1.87.45.5.72 1.12.72 1.89 0 2.7-1.64 3.29-3.21 3.47.25.22.48.65.48 1.31v1.94c0 .19.12.4.48.34A7.01 7.01 0 0015 8c0-3.87-3.13-7-7-7z" fill="currentColor"/>
              </svg>
            </span>
            <span class="card__contact-value">kanare-dev</span>
          </div>
          <div class="card__contact-item">
            <span class="card__contact-label">
              <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <path d="M1.5 5.5h2.5v8H1.5v-8zM2.75 4.5A1.25 1.25 0 112.75 2a1.25 1.25 0 010 2.5zM5.5 5.5h2.4v1.1c.33-.63 1.17-1.3 2.4-1.3 2.57 0 3.04 1.69 3.04 3.89V13.5h-2.5V9.7c0-.93 0-2.13-1.3-2.13-1.3 0-1.5 1.02-1.5 2.07v3.86H5.5V5.5z" fill="currentColor"/>
              </svg>
            </span>
            <span class="card__contact-value">/in/kanare</span>
          </div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
