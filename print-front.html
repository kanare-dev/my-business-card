<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Business Card Front — Kanare Kodera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@200;300;400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg:             #131210;
      --color-text-primary:   #BFBFBF;
      --color-text-secondary: #949494;
      --color-accent:         #d8aa00;

      --font-sans: 'IBM Plex Sans JP', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      /* 仕上がりサイズ */
      --card-w:  55mm;
      --card-h:  91mm;
      /* 塗り足し */
      --bleed:   3mm;
      /* ページサイズ = 仕上がり + 塗り足し × 2 */
      --page-w:  61mm;
      --page-h:  97mm;
      /* セーフエリア (仕上がり端からの余白) */
      --safe-h:  8mm;
      --safe-v:  7mm;

      --sp-xs:  1.5mm;
      --sp-sm:  3mm;
      --fs-name:  9.5mm;
      --fs-title: 2.2mm;
      --fs-tag:   1.9mm;
    }

    /* 印刷ページ設定 — 塗り足し込みサイズ */
    @page {
      size: var(--page-w) var(--page-h);
      margin: 0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width:      var(--page-w);
      height:     var(--page-h);
      background: var(--color-bg);
      font-family: var(--font-sans);
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .card {
      width:      var(--page-w);
      height:     var(--page-h);
      background: var(--color-bg);
      position:   relative;
      overflow:   hidden;
    }

    /* セーフエリア内コンテンツ — 塗り足し分を加算 */
    .card__inner {
      position: absolute;
      top:    calc(var(--bleed) + var(--safe-h));
      bottom: calc(var(--bleed) + var(--safe-h));
      left:   calc(var(--bleed) + var(--safe-v));
      right:  calc(var(--bleed) + var(--safe-v));
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card__name {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .card__name-line {
      font-family:    var(--font-sans);
      font-weight:    200;
      font-size:      var(--fs-name);
      letter-spacing: -0.01em;
      color:          var(--color-text-primary);
      line-height:    1.1;
    }

    .card__avatar-wrap {
      display: flex;
      justify-content: center;
    }

    .card__avatar {
      width:         13mm;
      height:        13mm;
      border-radius: 50%;
      overflow:      hidden;
    }

    .card__avatar img {
      width:      100%;
      height:     100%;
      object-fit: cover;
    }

    .card__bottom {
      display: flex;
      flex-direction: column;
      gap: var(--sp-sm);
    }

    .card__rule {
      width:      7mm;
      height:     0.25mm;
      background: var(--color-accent);
      flex-shrink: 0;
    }

    .card__title {
      font-family:    var(--font-sans);
      font-weight:    300;
      font-size:      var(--fs-title);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color:          var(--color-text-secondary);
    }

    .card__tags {
      display: flex;
      flex-direction: column;
      gap: var(--sp-xs);
    }

    .card__tag {
      font-family:    var(--font-mono);
      font-weight:    300;
      font-size:      var(--fs-tag);
      letter-spacing: 0.02em;
      color:          var(--color-text-secondary);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card__inner">

      <div class="card__name">
        <span class="card__name-line">Kanare</span>
        <span class="card__name-line">Kodera</span>
      </div>

      <div class="card__avatar-wrap">
        <div class="card__avatar">
          <img src="avatar.png" alt="Avatar">
        </div>
      </div>

      <div class="card__bottom">
        <div class="card__rule"></div>
        <span class="card__title">Cloud Engineer</span>
        <div class="card__tags">
          <span class="card__tag">AWS</span>
          <span class="card__tag">Terraform</span>
          <span class="card__tag">Kubernetes</span>
          <span class="card__tag">Platform Engineering</span>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
