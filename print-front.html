<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Business Card Front — Kanare Kodera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@200;300;400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles.css">
  <style>
    @page { size: var(--page-w) var(--page-h); margin: 0; }

    html, body {
      width:      var(--page-w);
      height:     var(--page-h);
      background: var(--color-bg);
      font-family: var(--font-sans);
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .card {
      width:      var(--page-w);
      height:     var(--page-h);
      background: var(--color-bg);
      position:   relative;
      overflow:   hidden;
    }

    .card__inner {
      position: absolute;
      top:    calc(var(--bleed) + var(--safe-h));
      bottom: calc(var(--bleed) + var(--safe-h));
      left:   calc(var(--bleed) + var(--safe-v));
      right:  calc(var(--bleed) + var(--safe-v));
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="card card--front" role="img" aria-label="Business card front — Kanare Kodera, Cloud Engineer">
  <div class="card__inner">

    <div class="card__name">
      <span class="card__name-line">Kanare</span>
      <span class="card__name-line">Kodera</span>
    </div>

    <div class="card__avatar-wrap">
      <div class="card__avatar">
        <img src="assets/avatar.png" alt="Avatar">
      </div>
    </div>

    <div class="card__bottom">
      <div class="card__rule"></div>
      <span class="card__title">Cloud Engineer</span>
      <div class="card__tags">
        <span class="card__tag">AWS</span>
        <span class="card__tag">Terraform</span>
        <span class="card__tag">Kubernetes</span>
        <span class="card__tag">Platform Engineering</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
