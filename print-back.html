<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Business Card Back — Kanare Kodera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@200;300;400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg:             #131210;
      --color-text-primary:   #BFBFBF;
      --color-text-secondary: #949494;
      --color-accent:         #d8aa00;

      --font-sans: 'IBM Plex Sans JP', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      --card-w:  55mm;
      --card-h:  91mm;
      --bleed:   3mm;
      --page-w:  61mm;
      --page-h:  97mm;
      --safe-h:  8mm;
      --safe-v:  7mm;

      --sp-xs:    1.5mm;
      --sp-sm:    3mm;
      --fs-label: 1.7mm;
      --fs-value: 2.1mm;
    }

    @page {
      size: var(--page-w) var(--page-h);
      margin: 0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width:      var(--page-w);
      height:     var(--page-h);
      background: var(--color-bg);
      font-family: var(--font-sans);
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .card {
      width:      var(--page-w);
      height:     var(--page-h);
      background: var(--color-bg);
      position:   relative;
      overflow:   hidden;
    }

    .card__inner {
      position: absolute;
      top:    calc(var(--bleed) + var(--safe-h));
      bottom: calc(var(--bleed) + var(--safe-h));
      left:   calc(var(--bleed) + var(--safe-v));
      right:  calc(var(--bleed) + var(--safe-v));
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-start;
    }

    .card__qr-wrap {
      align-self: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-xs);
    }

    .card__qr {
      width:           22mm;
      height:          22mm;
      background:      var(--color-text-primary);
      border-radius:   1mm;
      display:         flex;
      align-items:     center;
      justify-content: center;
      overflow:        hidden;
    }

    .card__qr img {
      width:  100%;
      height: 100%;
    }

    .card__qr-caption {
      font-family:    var(--font-mono);
      font-size:      1.6mm;
      font-weight:    300;
      letter-spacing: 0.05em;
      color:          var(--color-text-secondary);
    }

    .card__contact {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--sp-sm);
    }

    .card__rule {
      width:      7mm;
      height:     0.25mm;
      background: var(--color-accent);
      flex-shrink: 0;
    }

    .card__contact-group {
      display: flex;
      flex-direction: column;
      gap: var(--sp-xs);
    }

    .card__contact-item {
      display:     flex;
      align-items: center;
      gap:         2mm;
    }

    .card__contact-label {
      width:       4mm;
      height:      4mm;
      flex-shrink: 0;
      color:       var(--color-text-secondary);
      display:     flex;
      align-items: center;
    }

    .card__contact-label svg {
      width:  100%;
      height: 100%;
    }

    .card__contact-value {
      font-family:    var(--font-mono);
      font-weight:    300;
      font-size:      var(--fs-value);
      letter-spacing: 0.01em;
      color:          var(--color-text-primary);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card__inner">

      <div class="card__qr-wrap">
        <div class="card__qr">
          <img src="qr-code.svg" alt="QR code for kanare.dev">
        </div>
        <span class="card__qr-caption">kanare.dev</span>
      </div>

      <div class="card__contact">
        <div class="card__rule"></div>

        <div class="card__contact-group">
          <div class="card__contact-item">
            <span class="card__contact-label">
              <!-- tabler-world -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="9"/><path d="M3.6 9h16.8M3.6 15h16.8M11.5 3a17 17 0 0 0 0 18M12.5 3a17 17 0 0 1 0 18"/>
              </svg>
            </span>
            <span class="card__contact-value">kanare.dev</span>
          </div>
          <div class="card__contact-item">
            <span class="card__contact-label">
              <!-- tabler-mail -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/>
              </svg>
            </span>
            <span class="card__contact-value">me@kanare.dev</span>
          </div>
        </div>

        <div class="card__contact-group">
          <div class="card__contact-item">
            <span class="card__contact-label">
              <!-- tabler-brand-x -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 4l11.733 16H20L8.267 4zM4 20l6.768-6.768M15.232 9.232L20 4"/>
              </svg>
            </span>
            <span class="card__contact-value">@kanare_io</span>
          </div>
          <div class="card__contact-item">
            <span class="card__contact-label">
              <!-- tabler-brand-github -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 19c-4.3 1.4-4.3-2.5-6-3m12 5v-3.5c0-1 .1-1.4-.5-2 2.8-.3 5.5-1.4 5.5-6a4.6 4.6 0 0 0-1.3-3.2 4.2 4.2 0 0 0-.1-3.2s-1.1-.3-3.5 1.3a12.3 12.3 0 0 0-6.2 0C6.5 2.8 5.4 3.1 5.4 3.1a4.2 4.2 0 0 0-.1 3.2A4.6 4.6 0 0 0 4 9.5c0 4.6 2.7 5.7 5.5 6-.6.6-.6 1.2-.5 2V21"/>
              </svg>
            </span>
            <span class="card__contact-value">kanare-dev</span>
          </div>
          <div class="card__contact-item">
            <span class="card__contact-label">
              <!-- tabler-brand-linkedin -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 11v5M8 8v.01M12 16v-5M16 16v-3a2 2 0 0 0-4 0"/>
              </svg>
            </span>
            <span class="card__contact-value">/in/kanare</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
